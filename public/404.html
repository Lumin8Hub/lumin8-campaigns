<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lumin8 for Candidates</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the full path as a query string and redirects to the root
      // so that index.html can restore it before React Router boots.
      // slice(0, 2) keeps the "/lumin8-campaigns" repo segment while the site
      // is served from the GitHub Pages project URL. Change back to
      // slice(0, 1) when moving to the custom domain (root) deploy.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
</html>
