    <!-- GitHub Pages SPA: restore path from 404 redirect query string -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          var search = p.includes('?') ? p.split('?').slice(1).join('?') : '';
          var path = p.split('?')[0];
          window.history.replaceState(
            null, null,
            path + (search ? '?' + search : '') + h
          );
        }
      })();
    </script>
